name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'patch') || contains(github.event.pull_request.labels.*.name, 'minor') || contains(github.event.pull_request.labels.*.name, 'major'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump_type
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./app/app.json').expo.version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          TYPE=${{ steps.bump_type.outputs.type }}
          if [ "$TYPE" = "major" ]; then
            NEW="$((MAJOR+1)).0.0"
          elif [ "$TYPE" = "minor" ]; then
            NEW="${MAJOR}.$((MINOR+1)).0"
          else
            NEW="${MAJOR}.${MINOR}.$((PATCH+1))"
          fi
          CURRENT_CODE=$(node -p "require('./app/app.json').expo.android.versionCode")
          NEW_CODE=$((CURRENT_CODE+1))

          # app.json 업데이트
          node -e "
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('app/app.json'));
            json.expo.version = '${NEW}';
            json.expo.android.versionCode = ${NEW_CODE};
            fs.writeFileSync('app/app.json', JSON.stringify(json, null, 2) + '\n');
          "

          # seeds.rb 업데이트
          sed -i "s/ios_latest_version: '[0-9.]*'/ios_latest_version: '${NEW}'/" api/db/seeds.rb
          sed -i "s/ios_min_version: '[0-9.]*'/ios_min_version: '${NEW}'/" api/db/seeds.rb
          sed -i "s/android_latest_version: '[0-9.]*'/android_latest_version: '${NEW}'/" api/db/seeds.rb
          sed -i "s/android_min_version: '[0-9.]*'/android_min_version: '${NEW}'/" api/db/seeds.rb

          echo "new_version=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumped ${CURRENT} → ${NEW} (versionCode ${CURRENT_CODE} → ${NEW_CODE})"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/app.json api/db/seeds.rb
          git commit -m "chore: 버전 bump → v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new_version }}"
          name: "v${{ steps.bump.outputs.new_version }}"
          generate_release_notes: true
