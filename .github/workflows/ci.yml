name: CI

on:
  pull_request:
    paths:
      - 'api/**'

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: luna
          POSTGRES_PASSWORD: luna
          POSTGRES_DB: luna_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://luna:luna@localhost:5432/luna_test
      DEVISE_JWT_SECRET_KEY: ${{ secrets.DEVISE_JWT_SECRET_KEY || 'ci-test-secret-key-minimum-32-chars-long' }}

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: api/.ruby-version
          bundler-cache: true
          working-directory: api
      - name: Set up DB
        run: bundle exec rails db:schema:load && bundle exec rails db:migrate --trace
        working-directory: api
      - name: Run RSpec
        run: bundle exec rspec
        working-directory: api
